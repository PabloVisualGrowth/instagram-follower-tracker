<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Follower Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path
                            d="M3 16V8C3 5.23858 5.23858 3 8 3H16C18.7614 3 21 5.23858 21 8V16C21 18.7614 18.7614 21 16 21H8C5.23858 21 3 18.7614 3 16Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M17.5 6.51L17.51 6.49889" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <h1>IG Tracker</h1>
            </div>
            <p class="subtitle">Monitoriza tus seguidores con sigilo avanzado</p>
        </header>

        <main>
            <div class="action-card glass">
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span id="status-text">Listo para escanear</span>
                </div>
                <button id="run-bot-btn" class="primary-btn">
                    <span class="btn-content">Ejecutar Bot</span>
                    <span class="loader hidden"></span>
                </button>
            </div>

            <div id="results-area" class="hidden">
                <div class="stats-grid">
                    <div class="stat-box glass">
                        <span class="stat-label">Nuevos</span>
                        <span id="new-count" class="stat-value color-green">0</span>
                    </div>
                    <div class="stat-box glass">
                        <span class="stat-label">Unfollows</span>
                        <span id="unfollow-count" class="stat-value color-red">0</span>
                    </div>
                    <div class="stat-box glass">
                        <span class="stat-label">Total Real</span>
                        <span id="total-count" class="stat-value color-purple">0</span>
                    </div>
                </div>

                <div class="content-row">
                    <div class="list-container glass">
                        <h3>Lista de Seguidores</h3>
                        <div id="followers-list" class="scrollable-list">
                            <!-- Followers will be injected here -->
                        </div>
                    </div>

                    <div class="screenshot-container glass">
                        <h3>Última Captura</h3>
                        <div class="image-wrapper">
                            <img id="screenshot-img" src="" alt="Captura del bot">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 IG Tracker Dashboard • IA Powered</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
